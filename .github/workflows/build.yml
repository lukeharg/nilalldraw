name: Build and deploy

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours; GitHub may delay a few minutes at busy times
  workflow_dispatch: {} # manual trigger from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write # to commit the refreshed story store
  pages: write
  id-token: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch feeds and build site
        run: node build.js

      - name: Commit refreshed story store
        # Commits made with GITHUB_TOKEN don't retrigger this workflow, so no loop.
        run: |
          git config user.name "nilalldraw-build"
          git config user.email "actions@users.noreply.github.com"
          git add data/stories.json
          if ! git diff --staged --quiet; then
            git commit -m "data: refresh stories ($(date -u +'%Y-%m-%d %H:%M') UTC)"
            git pull --rebase origin main
            git push origin main
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
